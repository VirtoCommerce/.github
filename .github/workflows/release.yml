# v3.800.41
# https://virtocommerce.atlassian.net/browse/VCST-5372
name: Release workflow

on:
  workflow_call:
    secrets:
        envPAT:
          required: true

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      VCBUILD_DISABLE_RELEASE_APPROVAL: "true"
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.envPAT }}
          persist-credentials: false

      - name: Install VirtoCommerce.GlobalTool
        uses: VirtoCommerce/.github/actions/setup-vcbuild@VCST-5414

      - name: Setup Git Credentials
        uses: VirtoCommerce/.github/actions/setup-git-credentials-github@VCST-5414
        with: 
          githubToken: ${{ secrets.envPAT }}
      
      - name: Run vc-build QuickRelease
        shell: pwsh
        run: |
          $branchList = git branch --all --list '*/main'
          if ($Null -ne $branchList) {
            $branchMain = $branchList.Replace(' ','')
            if ($branchMain -eq 'remotes/origin/main') {
              $branchMain = 'main'
            }
          } else {
            $branchMain = 'master'
          }
          vc-build QuickRelease -MainBranch $branchMain
