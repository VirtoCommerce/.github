name: Auto-update pinned actions in workflow-templates

on:
  schedule:
    - cron: '0 8 * * 1' # Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pinact-update:
    runs-on: ubuntu-latest
    env:
      PINACT_VERSION: v3.10.1
      # Used by `gh release download` and by pinact when calling the GitHub
      # REST API to resolve latest tag SHAs. Without this, pinact falls back
      # to unauthenticated requests (60/hour) and the update will likely
      # rate-limit. GH_TOKEN is the alias gh CLI prefers; pinact reads
      # GITHUB_TOKEN.
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pinact
        run: |
          cd "$RUNNER_TEMP"
          gh release download "$PINACT_VERSION" \
            --repo suzuki-shunsuke/pinact \
            --pattern 'pinact_linux_amd64.tar.gz'
          tar -xzf pinact_linux_amd64.tar.gz
          sudo install pinact /usr/local/bin/

      - name: Bump pinned SHAs in workflow-templates
        shell: bash
        run: |
          shopt -s nullglob
          files=(workflow-templates/*.yml workflow-templates/*.yaml)
          if (( ${#files[@]} == 0 )); then
            echo "No workflow-template files found — nothing to do."
            exit 0
          fi
          pinact run -update "${files[@]}"

      - name: Open PR with updates
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "ci: Auto-update pinned actions in workflow-templates"
          title: "ci: Auto-update pinned actions in workflow-templates"
          branch: ci/pinact-update-templates
          delete-branch: true
          body: |
            Automated SHA updates for third-party actions referenced in
            `workflow-templates/`. Generated by `pinact run --update`.

            Dependabot handles updates to `.github/workflows/`; this job covers
            the gap for templates that are copied into module repos.
