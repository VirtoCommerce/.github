name: Auto-maintain workflows and templates (pin updates + security autofixes)

on:
  schedule:
    - cron: '0 8 * * 1' # Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pinact-update:
    runs-on: ubuntu-latest
    env:
      PINACT_VERSION: v3.10.1
      ZIZMOR_VERSION: 1.25.2
      # Used by `gh release download` and by pinact when calling the GitHub
      # REST API to resolve latest tag SHAs. Without this, pinact falls back
      # to unauthenticated requests (60/hour) and the update will likely
      # rate-limit. GH_TOKEN is the alias gh CLI prefers; pinact reads
      # GITHUB_TOKEN.
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pinact
        run: |
          cd "$RUNNER_TEMP"
          gh release download "$PINACT_VERSION" \
            --repo suzuki-shunsuke/pinact \
            --pattern 'pinact_linux_amd64.tar.gz'
          tar -xzf pinact_linux_amd64.tar.gz
          sudo install pinact /usr/local/bin/

      - name: Bump pinned SHAs in workflow-templates
        shell: bash
        run: |
          shopt -s nullglob
          files=(workflow-templates/*.yml workflow-templates/*.yaml)
          if (( ${#files[@]} == 0 )); then
            echo "No workflow-template files found — nothing to do."
            exit 0
          fi
          pinact run -update "${files[@]}"

      - name: Apply zizmor security autofixes
        shell: bash
        # GH_TOKEN/GITHUB_TOKEN (job env) let zizmor resolve SHAs -> tags for
        # the ref-version-mismatch fix. zizmor.yml (repo root) scopes
        # unpinned-uses so VirtoCommerce/* @master refs are allowed and never
        # auto-pinned. --fix=all applies safe + unsafe fixes; this PR is the
        # review gate for the unsafe ones. Both trees are processed:
        # .github/workflows/ ships reusable workflows consumed by other repos,
        # and workflow-templates/ is copied into module repos.
        # `|| true` so remaining unfixable findings don't block the PR.
        run: |
          pipx run --spec "zizmor==$ZIZMOR_VERSION" zizmor \
            --fix=all .github/workflows/ workflow-templates/ || true

      - name: Open PR with updates
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit-message: "ci: Auto-maintain workflows (pin updates + zizmor security autofixes)"
          title: "ci: Auto-maintain workflows (pin updates + zizmor security autofixes)"
          branch: ci/auto-maintain-workflows
          delete-branch: true
          body: |
            Automated maintenance of GitHub Actions workflows:

            - **Pin updates** — `pinact run --update` bumps third-party action
              SHAs in `workflow-templates/`. (Dependabot covers pins in
              `.github/workflows/`.)
            - **Security autofixes** — `zizmor --fix=all` applies safe **and
              unsafe** fixes (e.g. `template-injection`, `artipacked`,
              `ref-version-mismatch`) across **both** `.github/workflows/` and
              `workflow-templates/`, since the reusable workflows here are
              consumed by other repos and the templates are copied into modules.

            > [!WARNING]
            > `--fix=all` includes **unsafe** fixes that require human review.
            > In particular, check `artipacked` changes (`persist-credentials:
            > false`) on any workflow that later pushes with the checkout token,
            > and verify `template-injection` rewrites preserve intended values.
