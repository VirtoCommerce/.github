# v3.800.37
# https://virtocommerce.atlassian.net/browse/VCST-5155
name: Increment version

on:
  workflow_call:

    inputs:
      forceModuleManifest:
        description: 'Force to update version in module.manifest'
        required: false
        type: string
        default: 'false'
      versionType:
        description: 'Version type. Can be "Patch", "Minor"'
        required: false
        type: string
        default: 'Patch'

jobs:
  increment-version:
    runs-on: ubuntu-24.04
    env:
      MODULE_MANIFEST: ''

    steps: 

    - name: Set MODULE_MANIFEST value
      if: ${{ inputs.forceModuleManifest == 'true' }}
      run: echo "MODULE_MANIFEST=*module.manifest" >> $GITHUB_ENV

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install VirtoCommerce.GlobalTool
      uses: VirtoCommerce/vc-github-actions/setup-vcbuild@master

    - name: Setup Git Credentials
      uses: VirtoCommerce/vc-github-actions/setup-git-credentials-github@master
      with:
        githubToken: ${{ secrets.REPO_TOKEN }}

    - name: Increment ${{ inputs.versionType }} Version
      run: |
        vc-build Increment${INPUTS_VERSIONTYPE}
        git add Directory.Build.props ${{ env.MODULE_MANIFEST }}
        git commit -m "ci: Auto Increment${INPUTS_VERSIONTYPE}"
        git push
      env:
        INPUTS_VERSIONTYPE: ${{ inputs.versionType }}
