name: Deploy Module workflows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        type: string
        default: 'v3.800.41'

# Least privilege: pushes use the REPO_TOKEN PAT, so GITHUB_TOKEN needs only read.
permissions:
  contents: read

jobs:

  deploy:
    runs-on: ubuntu-latest
    strategy:
      # Deploy each repo independently — one repo failing (e.g. archived) must
      # not cancel the others.
      fail-fast: false
      matrix:
# Module workflows
        repoName: [vc-module-algolia-search
                  ,vc-module-app-insights
                  ,vc-module-assets
                  ,vc-module-authorize-net
                  ,vc-module-avatax
                  ,vc-module-azure-ad
                  ,vc-module-azure-app-configuration
                  ,vc-module-azure-search
                  ,vc-module-azureblob-assets
                  ,vc-module-back-in-stock
                  ,vc-module-background-jobs
                  ,vc-module-backup-restore
                  ,vc-module-builder-io
                  ,vc-module-bulk-actions
                  ,vc-module-cart
                  ,vc-module-catalog
                  ,vc-module-catalog-csv-export-import
                  ,vc-module-catalog-personalization
                  ,vc-module-catalog-publishing
                  ,vc-module-content
                  ,vc-module-contentful
                  ,vc-module-contract
                  ,vc-module-core
                  ,vc-module-customer
                  ,vc-module-customer-export-import
                  ,vc-module-customer-review
                  ,vc-module-cyber-source
                  ,vc-module-datatrans
                  ,vc-module-dynamic-associations
                  ,vc-module-elastic-app-search
                  ,vc-module-elastic-search
                  ,vc-module-elastic-search-8
                  ,vc-module-elastic-search-9
                  ,vc-module-environments-compare
                  ,vc-module-event-bus
                  ,vc-module-export
                  ,vc-module-file-experience-api
                  ,vc-module-filesystem-assets
                  ,vc-module-gdpr
                  ,vc-module-google-ecommerce-analytics
                  ,vc-module-google-sso
                  ,vc-module-hotjar
                  ,vc-module-image-tools
                  ,vc-module-import
                  ,vc-module-inventory
                  ,vc-module-loyalty
                  ,vc-module-lucene-search
                  ,vc-module-marketing
                  ,vc-module-marketing-experience-api
                  ,vc-module-native-payment-methods
                  ,vc-module-news
                  ,vc-module-notification
                  ,vc-module-open-search
                  ,vc-module-openid-connect
                  ,vc-module-order
                  ,vc-module-order-management
                  ,vc-module-pages
                  ,vc-module-payment
                  ,vc-module-power-bi-reports
                  ,vc-module-price-export-import
                  ,vc-module-pricing
                  ,vc-module-product-snapshot
                  ,vc-module-profile-experience-api
                  ,vc-module-push-messages
                  ,vc-module-quote
                  ,vc-module-return
                  ,vc-module-sales-rep
                  ,vc-module-search
                  ,vc-module-seo
                  ,vc-module-seq-log
                  ,vc-module-shipping
                  ,vc-module-shipstation
                  ,vc-module-sitemaps
                  ,vc-module-skyflow
                  ,vc-module-sql-queries
                  ,vc-module-state-machine
                  ,vc-module-store
                  ,vc-module-subscription
                  ,vc-module-system-operations
                  ,vc-module-task-management
                  ,vc-module-tax
                  ,vc-module-ucp
                  ,vc-module-webhooks
                  ,vc-module-white-labeling
                  ,vc-module-x-api
                  ,vc-module-x-cart
                  ,vc-module-x-catalog
                  ,vc-module-x-cms
                  ,vc-module-x-frontend
                  ,vc-module-x-order
                  ,vc-module-x-pickup
                  ,vc-module-x-recommend
                  ]

# Module samples workflows
        # include:
        # - deploymentFolder: modules-sample
        #   repoName: vc-module-order
        # - deploymentFolder: modules-sample
        #   repoName: vc-module-customer
        # - deploymentFolder: modules-sample
        #   repoName: vc-module-notification

    env:
      DEPLOY_REPO: ${{ github.repository_owner }}/${{ matrix.repoName }}
      TEMPLATE_REPO_FOLDER: 'main'
      TEMPLATES_LIST: 'release.yml publish-nugets.yml module-release-hotfix.yml module-ci.yml'
      WORKING_DIR: ${{ github.workspace }}
    steps:

    - name: Checkout .github
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.version }}
        path: ${{ env.TEMPLATE_REPO_FOLDER }}
        persist-credentials: false

    - name: Checkout ${{ env.DEPLOY_REPO }}
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: ${{ env.DEPLOY_REPO }}
        path: ${{ matrix.repoName }}
        token: ${{ secrets.REPO_TOKEN }}
        persist-credentials: false

    - name: Copy workflows
      working-directory: ${{ env.WORKING_DIR }}/${{ env.TEMPLATE_REPO_FOLDER }}/workflow-templates
      env:
        DEST_FOLDER: '${{ env.WORKING_DIR }}/${{ matrix.repoName }}/.github/workflows/'
      run: |
        cp ${{ env.TEMPLATES_LIST }} ${DEST_FOLDER}

    - name: Setup Git Credentials
      uses: VirtoCommerce/vc-github-actions/setup-git-credentials-github@master
      with: 
        githubToken: ${{ secrets.REPO_TOKEN }}

    - name: Commit changes to ${{ env.DEPLOY_REPO }}
      working-directory: ${{ matrix.repoName }}
      env:
        GH_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        # Skip archived repos (push is rejected) — DEPLOY_REPO comes from job env.
        if [ "$(gh api "repos/$DEPLOY_REPO" --jq '.archived')" = "true" ]; then
          echo "::warning::$DEPLOY_REPO is archived — skipping."
          exit 0
        fi
        git add .
        # Skip repos already up to date so a no-op doesn't fail the job.
        if git diff --cached --quiet; then
          echo "::warning::No changes for $DEPLOY_REPO — already up to date."
          exit 0
        fi
        git commit -m "ci: Auto update Github Action workflows"
        git push
