name: Workflow security

on:
  pull_request:
    paths:
      - 'workflow-templates/**'
      - '.github/workflows/**'
      - '**/action.yml'
      - '**/action.yaml'
      # Re-run when scanner configs change, so rules can't be relaxed unscanned.
      - 'zizmor.yml'
      - '.github/actionlint.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: 1.7.12
      ZIZMOR_VERSION: 1.25.2
      # zizmor reads GITHUB_TOKEN for its online audits (e.g. unpinned-tools);
      # the static audits like template-injection run without it.
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          cd "$RUNNER_TEMP"
          gh release download "v${ACTIONLINT_VERSION}" \
            --repo rhysd/actionlint \
            --pattern "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          sudo install actionlint /usr/local/bin/

      - name: Run actionlint
        # warning+ severity so real shell bugs fail; native checks scoped in .github/actionlint.yaml.
        env:
          SHELLCHECK_OPTS: '--severity=warning'
        run: actionlint .github/workflows/*.yml workflow-templates/*.yml

      - name: Install zizmor
        if: always()
        run: pipx install "zizmor==${ZIZMOR_VERSION}"

      - name: Run zizmor
        if: always()
        shell: bash
        # `.` discovers .github/workflows/* and all **/action.yml|yaml (composite
        # actions); templates sit outside .github/workflows/ so a dir arg finds
        # nothing — pass them as explicit globs (nullglob drops an empty match).
        # --collect scopes to trigger paths. actionlint can't lint composite actions.
        run: |
          shopt -s nullglob
          zizmor --collect=workflows,actions . workflow-templates/*.yml workflow-templates/*.yaml
