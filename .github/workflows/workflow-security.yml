name: Workflow security

on:
  pull_request:
    paths:
      - 'workflow-templates/**'
      - '.github/workflows/**'
      - '**/action.yml'
      - '**/action.yaml'
      # Re-run the gate when the scanners' own configs change, so a PR that
      # only relaxes a rule can't merge without actionlint/zizmor re-running.
      - 'zizmor.yml'
      - '.github/actionlint.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: 1.7.12
      ZIZMOR_VERSION: 1.25.2
      # zizmor reads GITHUB_TOKEN for its online audits (e.g. unpinned-tools);
      # the static audits like template-injection run without it.
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          cd "$RUNNER_TEMP"
          gh release download "v${ACTIONLINT_VERSION}" \
            --repo rhysd/actionlint \
            --pattern "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          sudo install actionlint /usr/local/bin/

      - name: Run actionlint
        # Keep warning+ severity so genuine shell bugs still fail the
        # gate. Native actionlint checks (e.g. the intentional empty choice option)
        # are scoped in .github/actionlint.yaml.
        env:
          SHELLCHECK_OPTS: '--severity=warning'
        run: actionlint .github/workflows/*.yml workflow-templates/*.yml

      - name: Install zizmor
        if: always()
        run: pipx install "zizmor==${ZIZMOR_VERSION}"

      - name: Run zizmor
        if: always()
        shell: bash
        # Passing `.` lets zizmor discover every **/action.yml|action.yaml
        # (composite actions, anywhere) plus .github/workflows/* — matching the
        # PR trigger paths. Templates live OUTSIDE .github/workflows/, so
        # zizmor's directory walk never classifies them as workflows; they must
        # be passed as explicit file paths (a bare `workflow-templates/` dir
        # collects zero inputs). --collect=workflows,actions keeps the scope to
        # the trigger paths (excludes dependabot.yml). nullglob so an unmatched
        # template glob disappears instead of being passed literally.
        # (actionlint above is workflow-only and cannot lint composite actions —
        # composite-action coverage is zizmor's job.)
        run: |
          shopt -s nullglob
          zizmor --collect=workflows,actions . workflow-templates/*.yml workflow-templates/*.yaml
