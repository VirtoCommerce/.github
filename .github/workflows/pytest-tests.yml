# v3.800.36
# https://virtocommerce.atlassian.net/browse/VCST-5151
name: Auto tests

on:
  workflow_call:
    inputs:
      adminPassword:
        description: 'Admin Password'
        required: false
        type: string
        default: ''
      adminUsername:
        description: 'Admin Username'
        required: false
        type: string
        default: 'admin'
      apiKey:
        description: 'API Key'
        required: false
        type: string
        default: ''
      backUrl:
        description: 'Back URL'
        required: false
        type: string
        default: 'http://localhost:8090'
      baseUrl:
        description: 'Base URL'
        required: false
        type: string
        default: 'http://localhost'
      browser:
        required: false
        type: string
        default: 'chromium'
      customModuleId:
        description: 'Custom Module id'
        required: false
        type: string
        default: ''
      customModuleUrl:
        description: 'Custom module Module url'
        required: false
        type: string
        default: ''
      customPackagesJsonUrl:
        description: 'Custom packages.json url'
        required: false
        type: string
        default: ''
      databaseProviders:
        description: 'JSON array of database providers to run the test matrix against. Any subset of: sqlserver, mysql, postgres'
        required: false
        type: string
        default: '["sqlserver","mysql","postgres"]'
      frontendZipUrl:
        required: false
        type: string
        default: 'latest'
      installCustomModule:
        description: 'Enable or disable "Install Custom Modules" step'
        required: false
        type: string
        default: 'false'
      installModules:
        description: 'Enable or disable "Install Modules" step'
        required: false
        type: string
        default: 'true'
      platformDockerTag:
        description: 'Platform docker tag'
        required: false
        type: string
        default: 'local-latest'
      prebuiltImageArtifact:
        description: 'Name of a workflow artifact containing a docker save tar of the platform image. When set, the action downloads and loads it instead of building or pulling, and installModules / installCustomModule / customPackagesJsonUrl must be unset.'
        required: false
        type: string
        default: ''
      pytestMarkers:
        description: 'Additional pytest -m marker expression, AND-combined with each suite''s default markers. Leave empty to use defaults only.'
        required: false
        default: ''
        type: string
      requiredModulesListUrl:
        description: 'The URL of the JSON file with the required modules list'
        required: false
        type: string
        default: ''
      skipDocCountVerification:
        description: 'Comma-separated document types whose post-reindex count check should be skipped (reindex still runs). Use when the seed dataset has 0 records for a type. Example: ''PickupLocation'' or ''PickupLocation,ContentFile''.'
        required: false
        default: ''
        type: string
      testSuites:
        description: 'Comma-separated list of suites to run. Any subset of: graphql, restapi, e2e'
        required: false
        default: 'graphql,restapi,e2e'
        type: string
      vctestingPath:
        description: 'UI tests path'
        required: false
        type: string
        default: 'vc-testing-module'
      vctestingRepo:
        description: 'UI tests repository'
        required: false
        type: string
        default: 'VirtoCommerce/vc-testing-module'
      vctestingRepoBranch:
        description: 'UI tests repository branch'
        required: false
        type: string
        default: 'dev'

    secrets:
      envPAT:
        required: true
      sendgridApiKey:
        required: true
      testSecretEnvFile:
        required: true
      appInsightsInstrumentationKey:
        description: 'Application Insights instrumentation key (GUID). Passed to the platform container so its telemetry lands in the configured Application Insights resource.'
        required: false

jobs:
  auto-autotests:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        databaseProvider: ${{ fromJSON(inputs.databaseProviders) }}

    env:
      GITHUB_TOKEN: ${{ secrets.envPAT }}

    steps:
    - name: Install VirtoCommerce.GlobalTool
      uses: VirtoCommerce/vc-github-actions/setup-vcbuild@master

    - name: Docker Env Full
      uses: VirtoCommerce/vc-github-actions/docker-env-full@master
      with:
        frontendZipUrl: ${{ inputs.frontendZipUrl }}
        installModules: ${{ inputs.installModules }}
        installCustomModule: ${{ inputs.installCustomModule }}
        platformDockerTag: ${{ inputs.platformDockerTag }}
        requiredModulesListUrl: ${{ inputs.requiredModulesListUrl }}
        testSecretEnvFile: ${{ secrets.testSecretEnvFile }}
        customPackagesJsonUrl: ${{ inputs.customPackagesJsonUrl }}
        customModuleId: ${{ inputs.customModuleId }}
        customModuleUrl: ${{ inputs.customModuleUrl }}
        sendgridApiKey: ${{ secrets.sendgridApiKey }}
        databaseProvider: ${{ matrix.databaseProvider }}
        prebuiltImageArtifact: ${{ inputs.prebuiltImageArtifact }}
        appInsightsInstrumentationKey: ${{ secrets.appInsightsInstrumentationKey }}

    - name: Run Auto Tests
      uses: VirtoCommerce/vc-github-actions/run-pytest-tests@VCST-5155 #master
      with:
        adminPassword: ${{ inputs.adminPassword }}
        adminUsername: ${{ inputs.adminUsername }}
        apiKey: ${{ inputs.apiKey }}
        backUrl: ${{ inputs.backUrl }}
        baseUrl: ${{ inputs.baseUrl }}
        browser: ${{ inputs.browser }}
        pytestMarkers: ${{ inputs.pytestMarkers }}
        testSecretEnvFile: ${{ secrets.testSecretEnvFile }}
        testSuites: ${{ inputs.testSuites }}
        vctestingPath: ${{ inputs.vctestingPath }}
        vctestingRepo: ${{ inputs.vctestingRepo }}
        vctestingRepoBranch: ${{ inputs.vctestingRepoBranch }}
        artifactSuffix: -${{ matrix.databaseProvider }}
        skipDocCountVerification: ${{ inputs.skipDocCountVerification }}