# v3.800.42
# https://virtocommerce.atlassian.net/browse/VCST-5373
name: VC unit test and sonar scan

on:
  workflow_call:
    secrets:
      sonarToken:
        required: true

jobs:
  test-and-sonar:
    runs-on: ubuntu-24.04
    env:
      SONAR_TOKEN: ${{ secrets.sonarToken }}
      MSBuildEnableWorkloadResolver: 'false'
  
    steps: 

    - name: Set up Node 24
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '24'

    - name: Set up Java 17
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install VirtoCommerce.GlobalTool
      uses: VirtoCommerce/vc-github-actions/setup-vcbuild@master
    
    - name: Install dotnet-sonarscanner
      run: dotnet tool install --global dotnet-sonarscanner

    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Get Artifact Version
      uses: VirtoCommerce/vc-github-actions/get-image-version@master
      id: artifactVer

    - name: Set VERSION_SUFFIX variables
      run: |
          echo "VERSION_SUFFIX=${STEPS_ARTIFACTVER_OUTPUTS_SUFFIX}" >> $GITHUB_ENV
      env:
        STEPS_ARTIFACTVER_OUTPUTS_SUFFIX: ${{ steps.artifactVer.outputs.suffix }}
 
    - name: Add version suffix
      if: ${{ github.ref != 'refs/heads/master' || github.ref != 'refs/heads/main' }}
      uses: VirtoCommerce/vc-github-actions/add-version-suffix@master
      with:
        versionSuffix: ${{ env.VERSION_SUFFIX }}


    - name: SonarCloud Begin
      uses: VirtoCommerce/vc-github-actions/sonar-scanner-begin@master

    - name: Build
      run: vc-build Compile

    - name: Unit Tests
      run: vc-build Test -skip

    - name: SonarCloud End
      uses: VirtoCommerce/vc-github-actions/sonar-scanner-end@master

    - name: Quality Gate
      uses: VirtoCommerce/vc-github-actions/sonar-quality-gate@master
      with:
        login: ${{ env.SONAR_TOKEN }}
