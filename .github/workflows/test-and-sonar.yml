# v3.800.41
# https://virtocommerce.atlassian.net/browse/VCST-5372
name: VC unit test and sonar scan

on:
  workflow_call:
    secrets:
      sonarToken:
        required: true

jobs:
  test-and-sonar:
    runs-on: ubuntu-24.04
    env:
      SONAR_TOKEN: ${{ secrets.sonarToken }}
      MSBuildEnableWorkloadResolver: 'false'
  
    steps: 

    - name: Set up Node 24
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '24'

    - name: Set up Java 17
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install VirtoCommerce.GlobalTool
      uses: VirtoCommerce/.github/actions/setup-vcbuild@VCST-5414
    
    - name: Install dotnet-sonarscanner
      run: dotnet tool install --global dotnet-sonarscanner

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Get Artifact Version
      uses: VirtoCommerce/.github/actions/get-image-version@VCST-5414
      id: artifactVer

    - name: Set VERSION_SUFFIX variables
      run: |
          echo "VERSION_SUFFIX=${STEPS_ARTIFACTVER_OUTPUTS_SUFFIX}" >> $GITHUB_ENV
      env:
        STEPS_ARTIFACTVER_OUTPUTS_SUFFIX: ${{ steps.artifactVer.outputs.suffix }}
 
    - name: Add version suffix
      if: ${{ github.ref != 'refs/heads/master' || github.ref != 'refs/heads/main' }}
      uses: VirtoCommerce/.github/actions/add-version-suffix@VCST-5414
      with:
        versionSuffix: ${{ env.VERSION_SUFFIX }}


    - name: SonarCloud Begin
      uses: VirtoCommerce/.github/actions/sonar-scanner-begin@VCST-5414

    - name: Build
      run: vc-build Compile

    - name: Unit Tests
      run: vc-build Test -skip

    - name: SonarCloud End
      uses: VirtoCommerce/.github/actions/sonar-scanner-end@VCST-5414

    - name: Quality Gate
      uses: VirtoCommerce/.github/actions/sonar-quality-gate@VCST-5414
      with:
        login: ${{ env.SONAR_TOKEN }}
