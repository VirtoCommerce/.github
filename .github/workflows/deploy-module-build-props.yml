name: Deploy Module build props

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        type: string
        default: 'v3.800.40'

# Least privilege: pushes use the REPO_TOKEN PAT, so GITHUB_TOKEN needs only read.
permissions:
  contents: read

jobs:

  # Load the shared module list (modules.json at repo root) once and expose it as
  # a JSON array so the deploy matrix can fan out over it. Single source of truth
  # shared with deploy-module-workflows.yml.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.load.outputs.repos }}
    steps:
    - name: Checkout .github
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.version }}
        persist-credentials: false

    - name: Load module list
      id: load
      run: echo "repos=$(jq -c . modules.json)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      # Deploy each repo independently — one repo failing (e.g. archived) must
      # not cancel the others.
      fail-fast: false
      matrix:
        repoName: ${{ fromJson(needs.prepare.outputs.repos) }}

    env:
      TARGET_REPO: ${{ github.repository_owner }}/${{ matrix.repoName }}
      # Modules use 'dev' as their default/integration branch — target it explicitly
      # rather than relying on the repo's default-branch pointer.
      TARGET_BRANCH: 'dev'
      TEMPLATE_REPO_FOLDER: 'main'
      # Fully-owned props files copied verbatim into each module root (overwrite = safe,
      # we own them). They are imported by — never merged into — the module's own
      # Directory.Build.props, so per-module settings (VersionPrefix, etc.) are preserved.
      BUILD_PROPS_LIST: 'nuget-audit.props'
      WORKING_DIR: ${{ github.workspace }}
    steps:

    - name: Checkout .github
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.version }}
        path: ${{ env.TEMPLATE_REPO_FOLDER }}
        persist-credentials: false

    - name: Checkout ${{ env.TARGET_REPO }}
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: ${{ env.TARGET_REPO }}
        ref: ${{ env.TARGET_BRANCH }}
        path: ${{ matrix.repoName }}
        token: ${{ secrets.REPO_TOKEN }}
        persist-credentials: false

    - name: Copy build props and ensure import
      # Shared with create-module-repository.yml so the managed-block markers stay
      # identical across both call sites. matrix.repoName is passed via env (not
      # interpolated into the shell) to avoid a template-injection sink.
      env:
        MODULE_DIR: ${{ matrix.repoName }}
      run: |
        bash "${WORKING_DIR}/${TEMPLATE_REPO_FOLDER}/scripts/ensure-build-props-import.sh" \
          "${WORKING_DIR}/${MODULE_DIR}" \
          "${WORKING_DIR}/${TEMPLATE_REPO_FOLDER}/common-build-props" \
          "${BUILD_PROPS_LIST}"

    - name: Setup Git Credentials
      uses: VirtoCommerce/vc-github-actions/setup-git-credentials-github@master
      with:
        githubToken: ${{ secrets.REPO_TOKEN }}

    - name: Commit changes to ${{ env.TARGET_REPO }}
      working-directory: ${{ matrix.repoName }}
      env:
        GH_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        # Skip archived repos (push is rejected) — TARGET_REPO comes from job env.
        if [ "$(gh api "repos/$TARGET_REPO" --jq '.archived')" = "true" ]; then
          echo "::warning::$TARGET_REPO is archived — skipping."
          exit 0
        fi
        git add .
        # Skip repos already up to date so a no-op doesn't fail the job.
        if git diff --cached --quiet; then
          echo "::warning::No changes for $TARGET_REPO — already up to date."
          exit 0
        fi
        git commit -m "ci: Auto update common build props"
        git push origin "HEAD:${TARGET_BRANCH}"
