name: Create Module Repository
run-name: "Create module: ${{ github.repository_owner }} / ${{ inputs.moduleName }}"

on:
  workflow_dispatch:
    inputs:
      moduleName:
        description: 'PascalCase module name (e.g. News). Repository will be named vc-module-{kebab}'
        required: true
        type: string
      template:
        description: 'Module code template'
        required: false
        type: choice
        options:
          - vc-module-dba
          - vc-module-dba-xapi
          - vc-module-xapi
        default: 'vc-module-dba'
      companyName:
        description: 'Company namespace prefix, used for module template compiling'
        required: false
        type: string
        default: 'VirtoCommerce'
      author:
        description: 'Module author name'
        required: false
        type: string
        default: 'VirtoCommerce'
      moduleVersion:
        description: '(Optional) Initial module version'
        required: false
        type: string
      platformVersion:
        description: '(Optional) PLATFORM version'
        required: false
        type: string
      coreVersion:
        description: '(Optional) CORE module version (vc-module-dba, vc-module-dba-xapi)'
        required: false
        type: string
      xapiVersion:
        description: '(Optional) XAPI module version (vc-module-xapi, vc-module-dba-xapi)'
        required: false
        type: string
      templateVersion:
        description: '(Optional) VirtoCommerce.Module.Template (VirtoCommerce/vc-cli-module-template) version (empty = latest)'
        required: false
        type: choice
        options:
          - ''
          - '3.809.0'
        default: ''
      visibility:
        description: 'Repository visibility'
        required: false
        type: choice
        options:
          - public
          - private
        default: 'public'

# Prevent concurrent runs for the same module name to avoid race conditions
# on existence checks and resource creation.
concurrency:
  group: module-repository-${{ inputs.moduleName }}-${{ github.repository_owner }}
  cancel-in-progress: false

jobs:

  summarize-inputs:
    runs-on: ubuntu-latest
    env:
      MODULE_NAME:      ${{ inputs.moduleName }}
      COMPANY_NAME:     ${{ inputs.companyName }}
      AUTHOR:           ${{ inputs.author }}
      MODULE_VERSION:   ${{ inputs.moduleVersion }}
      PLATFORM_VERSION: ${{ inputs.platformVersion }}
      CORE_VERSION:     ${{ inputs.coreVersion }}
      XAPI_VERSION:     ${{ inputs.xapiVersion }}
      TEMPLATE_VERSION: ${{ inputs.templateVersion }}
      TEMPLATE:         ${{ inputs.template }}
      VISIBILITY:       ${{ inputs.visibility }}
    outputs:
      repoName:        ${{ steps.names.outputs.repoName }}
      moduleId:        ${{ steps.names.outputs.moduleId }}
      sonarProjectKey: ${{ steps.names.outputs.sonarProjectKey }}
    steps:
      - name: Validate module name
        run: |
          # Must start with an uppercase letter and contain only letters and digits
          if ! echo "$MODULE_NAME" | grep -qE '^[A-Z][a-zA-Z0-9]+$'; then
            echo "::error::moduleName '$MODULE_NAME' is invalid. Must start with an uppercase letter and contain only letters and digits (e.g. 'News', 'NewsArticle')."
            exit 1
          fi
          echo "moduleName '$MODULE_NAME' is valid."

      - name: Validate template parameters
        run: |
          SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+$'
          ERRORS=0

          check_version() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ] && ! [[ "$value" =~ $SEMVER_RE ]]; then
              echo "::error::$name '$value' is not a valid version (expected x.x.x)."
              ERRORS=$((ERRORS + 1))
            fi
          }

          check_version "moduleVersion"   "$MODULE_VERSION"
          check_version "platformVersion" "$PLATFORM_VERSION"
          check_version "xapiVersion"     "$XAPI_VERSION"
          check_version "coreVersion"     "$CORE_VERSION"

          if [ "$ERRORS" -gt 0 ]; then exit 1; fi
          echo "All version inputs are valid."

      - name: Compute and print names
        id: names
        run: |
          KEBAB=$(echo "$MODULE_NAME" | sed 's/\([A-Z]\)/-\1/g' | sed 's/^-//' | tr '[:upper:]' '[:lower:]')
          REPO_NAME="vc-module-${KEBAB}"
          MODULE_ID="${COMPANY_NAME}.${MODULE_NAME}"
          SONAR_KEY="${GITHUB_REPOSITORY_OWNER}_${REPO_NAME}"
          echo "repoName=${REPO_NAME}"        >> $GITHUB_OUTPUT
          echo "moduleId=${MODULE_ID}"        >> $GITHUB_OUTPUT
          echo "sonarProjectKey=${SONAR_KEY}" >> $GITHUB_OUTPUT

          echo "### Inputs"                                                              >> $GITHUB_STEP_SUMMARY
          echo "| Parameter       | Value |"                                            >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|-------|"                                            >> $GITHUB_STEP_SUMMARY
          echo "| moduleName      | $MODULE_NAME |"                                    >> $GITHUB_STEP_SUMMARY
          echo "| companyName     | $COMPANY_NAME |"                                   >> $GITHUB_STEP_SUMMARY
          echo "| author          | $AUTHOR |"                                         >> $GITHUB_STEP_SUMMARY
          echo "| moduleVersion   | $MODULE_VERSION |"                                 >> $GITHUB_STEP_SUMMARY
          echo "| platformVersion | $PLATFORM_VERSION |"                               >> $GITHUB_STEP_SUMMARY
          echo "| coreVersion     | $CORE_VERSION |"                                   >> $GITHUB_STEP_SUMMARY
          echo "| xapiVersion     | $XAPI_VERSION |"                                   >> $GITHUB_STEP_SUMMARY
          echo "| templateVersion | ${TEMPLATE_VERSION:-latest} |"                     >> $GITHUB_STEP_SUMMARY
          echo "| template        | $TEMPLATE |"                                       >> $GITHUB_STEP_SUMMARY
          echo "| visibility      | $VISIBILITY |"                                     >> $GITHUB_STEP_SUMMARY
          echo ""                                                                        >> $GITHUB_STEP_SUMMARY
          echo "### Computed names"                                                     >> $GITHUB_STEP_SUMMARY
          echo "| Name           | Value |"                                             >> $GITHUB_STEP_SUMMARY
          echo "|----------------|-------|"                                             >> $GITHUB_STEP_SUMMARY
          echo "| Repository     | ${GITHUB_REPOSITORY_OWNER}/${REPO_NAME} |"          >> $GITHUB_STEP_SUMMARY
          echo "| Module ID      | ${MODULE_ID} |"                                     >> $GITHUB_STEP_SUMMARY
          echo "| SonarCloud key | ${SONAR_KEY} |"                                     >> $GITHUB_STEP_SUMMARY

  create-module-repository:
    needs: summarize-inputs
    runs-on: ubuntu-latest
    # Requires manual approval from a designated reviewer before any resources are created.
    # Configure required reviewers at: Settings → Environments → module-repository-management
    environment: module-repository-management
    env:
      GH_TOKEN:         ${{ secrets.MODULE_REPO_MGMT_TOKEN }}
      SONAR_TOKEN:      ${{ secrets.SONARCLOUD_TOKEN }} #${{ secrets.SONAR_TOKEN }}
      SONAR_ORG_KEY:    ${{ vars.SONAR_ORG_KEY }}
      ORG_NAME:         ${{ github.repository_owner }}
      REPO_NAME:        ${{ needs.summarize-inputs.outputs.repoName }}
      REPO_FULL_NAME:   ${{ github.repository_owner }}/${{ needs.summarize-inputs.outputs.repoName }}
      MODULE_ID:        ${{ needs.summarize-inputs.outputs.moduleId }}
      SONAR_PROJECT_KEY: ${{ needs.summarize-inputs.outputs.sonarProjectKey }}
      VISIBILITY:       ${{ inputs.visibility }}
      MODULE_NAME:      ${{ inputs.moduleName }}
      COMPANY_NAME:     ${{ inputs.companyName }}
      AUTHOR:           ${{ inputs.author }}
      TEMPLATE:         ${{ inputs.template }}
      TEMPLATE_VERSION: ${{ inputs.templateVersion }}
      MODULE_VERSION:   ${{ inputs.moduleVersion }}
      PLATFORM_VERSION: ${{ inputs.platformVersion }}
      CORE_VERSION:     ${{ inputs.coreVersion }}
      XAPI_VERSION:     ${{ inputs.xapiVersion }}

    steps:

      - name: Check repository does not exist
        run: |
          if gh api /repos/$REPO_FULL_NAME --silent 2>/dev/null; then
            echo "::error::Repository $REPO_FULL_NAME already exists."
            exit 1
          fi
          echo "Repository $REPO_FULL_NAME does not exist — proceeding."

      - name: Check SonarCloud project does not exist
        if: ${{ env.VISIBILITY == 'public' }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "https://sonarcloud.io/api/projects/search?projects=$SONAR_PROJECT_KEY&organization=$SONAR_ORG_KEY")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::SonarCloud project search failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          TOTAL=$(echo "$BODY" | grep -o '"total":[0-9]*' | cut -d: -f2)
          echo "Projects found: ${TOTAL:-0}"
          if [ "${TOTAL:-0}" -gt "0" ]; then
            echo "::error::SonarCloud project '$SONAR_PROJECT_KEY' already exists."
            exit 1
          fi

      - name: Create repository
        id: create-repo
        run: |
          gh repo create $REPO_FULL_NAME \
            --$VISIBILITY \
            --description "$ORG_NAME $MODULE_NAME module"
          echo "created=true" >> $GITHUB_OUTPUT
          REPO_ID=$(gh api repos/$REPO_FULL_NAME --jq '.id')
          echo "repoId=$REPO_ID" >> $GITHUB_OUTPUT
          echo "Repository created: https://github.com/$REPO_FULL_NAME"

      - name: Configure repository settings
        run: |
          gh api \
            --method PATCH \
            /repos/$REPO_FULL_NAME \
            --field allow_merge_commit=false \
            --field allow_squash_merge=true \
            --field squash_merge_commit_title=PR_TITLE \
            --field squash_merge_commit_message=BLANK \
            --field allow_rebase_merge=false \
            --field allow_update_branch=true \
            --field delete_branch_on_merge=true
          gh api \
            --method PUT \
            /repos/$REPO_FULL_NAME/actions/permissions \
            --field enabled=true \
            --field allowed_actions=all

      - name: Configure teams
        run: |
          declare -A TEAMS=([platform]=push [virto-commerce]=maintain [virto-operations]=admin)
          for TEAM in "${!TEAMS[@]}"; do
            echo "Adding team $TEAM (${TEAMS[$TEAM]})"
            gh api \
              --method PUT \
              /orgs/$ORG_NAME/teams/$TEAM/repos/$REPO_FULL_NAME \
              --field permission=${TEAMS[$TEAM]}
          done

      - name: Checkout .github (workflow templates)
        uses: actions/checkout@v4
        with:
          path: dotgithub
          token: ${{ env.GH_TOKEN }}

      - name: Install module template
        run: |
          if [ -n "$TEMPLATE_VERSION" ]; then
            dotnet new install "VirtoCommerce.Module.Template::$TEMPLATE_VERSION"
          else
            dotnet new install VirtoCommerce.Module.Template
          fi

      - name: Generate module code
        run: |
          # Common args accepted by all module templates
          ARGS=(
            --output /tmp/generated
            --ModuleName    "$MODULE_NAME"
            --CompanyName   "$COMPANY_NAME"
            --Author        "$AUTHOR"
          )
          [ -n "$MODULE_VERSION"   ] && ARGS+=(--ModuleVersion   "$MODULE_VERSION")
          [ -n "$PLATFORM_VERSION" ] && ARGS+=(--PlatformVersion "$PLATFORM_VERSION")
          [ -n "$CORE_VERSION"     ] && ARGS+=(--CoreVersion     "$CORE_VERSION")
          [ -n "$XAPI_VERSION"     ] && ARGS+=(--XapiVersion     "$XAPI_VERSION")
          dotnet new "$TEMPLATE" "${ARGS[@]}"

      - name: Clone new repository
        run: |
          git clone https://x-access-token:$GH_TOKEN@github.com/$REPO_FULL_NAME.git repo
          # Ensure the default branch is 'main' regardless of org-level settings
          git -C repo symbolic-ref HEAD refs/heads/main

      - name: Copy generated code into repo
        run: |
          # Locate the generated root by its .sln file inside the output directory
          GENERATED_DIR=$(find /tmp/generated -maxdepth 2 -name "*.sln" | head -1 | xargs dirname 2>/dev/null)
          if [ -z "$GENERATED_DIR" ]; then
            echo "::error::dotnet new did not produce expected output — no .sln file found in /tmp/generated."
            exit 1
          fi
          echo "Generated directory: $GENERATED_DIR"
          cp -r "$GENERATED_DIR/." repo/

      - name: Add deployment config
        run: |
          mkdir -p repo/.deployment/module
          cat > repo/.deployment/module/cloudDeploy.json << EOF
          {
              "artifactKey": "$MODULE_ID",
              "deployRepo": "vc-deploy-dev",
              "cmPath": "backend/packages.json",
              "dev": {
                  "deployAppName": "vcptcore-dev",
                  "deployBranch": "vcptcore-dev",
                  "environmentId": "dev",
                  "environmentName": "Development",
                  "environmentType": "staging",
                  "environmentUrl": "https://vcptcore-dev.govirto.com/"
              },
              "qa": {
                  "deployAppName": "vcptcore-qa",
                  "deployBranch": "vcptcore-qa",
                  "environmentId": "qa",
                  "environmentName": "QA",
                  "environmentType": "testing",
                  "environmentUrl": "https://vcptcore-qa.govirto.com/"
              },
              "prod": {
                  "deployAppName": "vcptcore-demo",
                  "deployBranch": "vcptcore-demo",
                  "environmentId": "prod",
                  "environmentName": "Demo",
                  "environmentType": "production",
                  "environmentUrl": "https://vcptcore-demo.govirto.com/"
              }
          }
          EOF
          echo "Deployment config written to .deployment/module/cloudDeploy.json"

      - name: Add .github workflows
        run: |
          mkdir -p repo/.github/workflows
          cp dotgithub/workflow-templates/module-ci.yml              repo/.github/workflows/
          cp dotgithub/workflow-templates/release.yml                repo/.github/workflows/
          cp dotgithub/workflow-templates/publish-nugets.yml         repo/.github/workflows/
          cp dotgithub/workflow-templates/module-release-hotfix.yml  repo/.github/workflows/
          echo "Workflows added: module-ci.yml, release.yml, publish-nugets.yml, module-release-hotfix.yml"

      - name: Add .github community files
        run: |
          cat > repo/.github/CODEOWNERS << 'EOF'
          * @VirtoCommerce/platform
          EOF

          cat > repo/.github/ISSUE_TEMPLATE.md << 'EOF'
          ---
          name: Bug report or Feature request
          about: Create a report to help us improve
          ---

          ## Current behavior

          ## Expected behavior

          ## Steps to reproduce

          ## Environment
          EOF

          cat > repo/.github/pull_request_template.md << 'EOF'
          ## Description

          ## References
          ### QA-test:
          ### Jira-link:
          ### Artifact URL:
          EOF

      - name: Setup Git credentials
        uses: VirtoCommerce/vc-github-actions/setup-git-credentials-github@master
        with:
          githubToken: ${{ env.GH_TOKEN }}

      - name: Commit and push main
        working-directory: repo
        run: |
          git add .
          git commit -m "ci: Initialize module repository"
          git push -u origin main

      - name: Create and push default dev branch
        working-directory: repo
        run: |
          git checkout -b dev
          git push -u origin dev
          gh repo edit $REPO_FULL_NAME --default-branch dev

      - name: Protect branches
        run: |
          POLICY=$(cat << 'EOF'
          {
            "required_status_checks": {
              "strict": false,
              "contexts": [
                "license/cla",
                "ci",
                "SonarCloud Code Analysis",
                "module-katalon-tests / e2e-tests"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": false,
              "require_code_owner_reviews": false,
              "require_last_push_approval": false,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_conversation_resolution": false
          }
          EOF
          )
          for BRANCH in main dev; do
            printf "Protecting branch: %s ... " "$BRANCH"
            if echo "$POLICY" | gh api \
              --method PUT \
              /repos/$REPO_FULL_NAME/branches/$BRANCH/protection \
              --input - > /dev/null; then
              echo "OK"
            else
              echo "FAILED"
              exit 1
            fi
          done
          echo "Branches protected: main, dev"

      - name: Configure SonarCloud project
        id: create-sonarcloud
        if: ${{ env.VISIBILITY == 'public' }}
        run: |
          # sonar_post <label> <endpoint> [curl-args...]
          sonar_post() {
            local LABEL="$1" ENDPOINT="$2"; shift 2
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $SONAR_TOKEN" \
              "https://sonarcloud.io/$ENDPOINT" "$@")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "[$LABEL] HTTP $HTTP_CODE: $BODY"
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "::error::$LABEL failed (HTTP $HTTP_CODE): $BODY"
              exit 1
            fi
          }

          # Create project and bind to GitHub in one call.
          # installationKeys format: {github-org}/{repo-name}|{github-repo-id}
          INSTALLATION_KEY="$REPO_FULL_NAME|${{ steps.create-repo.outputs.repoId }}"
          sonar_post "provision_projects" "api/alm_integration/provision_projects" \
            --data-urlencode "installationKeys=$INSTALLATION_KEY" \
            --data-urlencode "organization=$SONAR_ORG_KEY"
          echo "created=true" >> $GITHUB_OUTPUT

          # Extract the actual project key assigned by SonarCloud and override SONAR_PROJECT_KEY
          # for subsequent steps if it differs from our computed value.
          PROVISIONED_KEY=$(echo "$BODY" | grep -o '"projectKey":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -n "$PROVISIONED_KEY" ] && [ "$PROVISIONED_KEY" != "$SONAR_PROJECT_KEY" ]; then
            echo "::warning::Provisioned project key '$PROVISIONED_KEY' differs from computed '$SONAR_PROJECT_KEY'. Using provisioned key."
            echo "SONAR_PROJECT_KEY=$PROVISIONED_KEY" >> $GITHUB_ENV
            SONAR_PROJECT_KEY="$PROVISIONED_KEY"
          fi
          echo "SonarCloud project created and bound to GitHub: $REPO_FULL_NAME"

          # Grant the token user project-level admin so subsequent API calls succeed.
          # Org-level "Administer" does not cascade to project-level permissions in SonarCloud.
          CURRENT_LOGIN=$(curl -s \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "https://sonarcloud.io/api/users/current" | grep -o '"login":"[^"]*"' | head -1 | cut -d'"' -f4)
          sonar_post "permissions/add_user" "api/permissions/add_user" \
            --data-urlencode "projectKey=$SONAR_PROJECT_KEY" \
            --data-urlencode "login=$CURRENT_LOGIN" \
            --data-urlencode "permission=admin"
          echo "Project-level admin granted to: $CURRENT_LOGIN"

          # Disable Automatic Analysis — CI-based analysis (dotnet-sonarscanner) is used instead
          sonar_post "autoscan/disable" "api/autoscan/activation" \
            --data-urlencode "enable=false" \
            --data-urlencode "projectKey=$SONAR_PROJECT_KEY"
          echo "Automatic Analysis disabled."

          # Set New Code definition to "Previous version"
          for KEY in sonar.leak.period sonar.leak.period.type; do
            sonar_post "$KEY" "api/settings/set" \
              --data-urlencode "component=$SONAR_PROJECT_KEY" \
              --data-urlencode "key=$KEY" \
              --data-urlencode "value=previous_version"
          done
          echo "New Code definition set to: Previous version"

      - name: Set repository custom properties
        # Property schemas must be pre-defined in the org:
        # Settings → Custom properties → New property
        # Required properties: module-template, module-id, platform-version,
        #   created-by, created-at, workflow-run
        # Optional: sonar-key (set only for public repos)
        # Failure here does not fail the workflow — repo setup is already complete.
        continue-on-error: true
        run: |
          CREATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PROPS='{"properties":['
          PROPS+='{"property_name":"module-template","value":"'"$TEMPLATE"'"}'
          PROPS+=',{"property_name":"module-id","value":"'"$MODULE_ID"'"}'
          PROPS+=',{"property_name":"platform-version","value":"'"$PLATFORM_VERSION"'"}'
          PROPS+=',{"property_name":"created-by","value":"'"$GITHUB_ACTOR"'"}'
          PROPS+=',{"property_name":"created-at","value":"'"$CREATED_AT"'"}'
          PROPS+=',{"property_name":"workflow-run","value":"'"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'"}'
          if [ "$VISIBILITY" = "public" ]; then
            PROPS+=',{"property_name":"sonar-key","value":"'"$SONAR_PROJECT_KEY"'"}'
          fi
          PROPS+=']}'
          echo "$PROPS" | gh api \
            --method PATCH \
            /repos/$REPO_FULL_NAME/properties/values \
            --input -
          echo "Repository custom properties set."

      - name: Register repository in deploy-module-workflows.yml
        # Inserts the new repo into the sorted matrix list and commits back.
        # Failure here does not fail the workflow — repo setup is already complete.
        # Git user identity is already configured by the Setup Git credentials step.
        continue-on-error: true
        working-directory: dotgithub
        run: |
          NEW_REPO="$REPO_NAME"
          FILE=".github/workflows/deploy-module-workflows.yml"

          python3 - "$NEW_REPO" "$FILE" << 'PYEOF'
          import sys, re
          repo, path = sys.argv[1], sys.argv[2]
          with open(path) as f:
              content = f.read()
          m = re.search(r'(        repoName: \[)([\s\S]*?)(\])', content)
          if not m:
              sys.exit('repoName list not found')
          entries = [e.strip().lstrip(',') for e in m.group(2).splitlines() if e.strip()]
          if repo in entries:
              print(f'{repo} already in list — nothing to do')
              sys.exit(0)
          entries.append(repo)
          entries.sort()
          indent_match = re.search(r'\n( +),', m.group(2))
          indent = indent_match.group(1) if indent_match else ' ' * (len(m.group(1)) - 1)
          new_body = entries[0] + ''.join(f'\n{indent},{e}' for e in entries[1:])
          new_content = content[:m.start()] + m.group(1) + new_body + '\n' + indent + m.group(3) + content[m.end():]
          with open(path, 'w') as f:
              f.write(new_content)
          print(f'Added {repo}')
          PYEOF

          git add "$FILE"
          if git diff --cached --quiet; then
            echo "$NEW_REPO was already in deploy-module-workflows.yml — no commit needed."
          else
            git commit -m "ci: Add $NEW_REPO to deploy-module-workflows"
            # Pull and rebase to handle concurrent pushes, then retry once.
            if ! git push; then
              echo "Push failed — pulling and rebasing..."
              if git pull --rebase && git push; then
                echo "$NEW_REPO registered in deploy-module-workflows.yml."
              else
                echo "::warning::Could not register $NEW_REPO in deploy-module-workflows.yml after rebase — add it manually."
              fi
            else
              echo "$NEW_REPO registered in deploy-module-workflows.yml."
            fi
          fi

      - name: Delete GitHub repository (rollback)
        if: failure() && steps.create-repo.outputs.created == 'true'
        run: |
          if DELETE_OUTPUT=$(gh api --method DELETE /repos/$REPO_FULL_NAME 2>&1); then
            echo "Repository $REPO_FULL_NAME deleted."
          elif echo "$DELETE_OUTPUT" | grep -qi "not found\|404"; then
            echo "Repository does not exist — nothing to clean up."
          else
            echo "::warning::Delete attempt failed: $DELETE_OUTPUT"
          fi

      - name: Delete SonarCloud project (rollback)
        if: failure() && steps.create-sonarcloud.outputs.created == 'true'
        run: |
          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "SonarCloud project key not available (failed before computing names) — nothing to clean up."
            exit 0
          fi
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "https://sonarcloud.io/api/projects/search?projects=$SONAR_PROJECT_KEY&organization=$SONAR_ORG_KEY" \
            2>/dev/null || echo '{}')
          TOTAL=$(echo "$RESPONSE" | grep -o '"total":[0-9]*' | cut -d: -f2)
          if [ "${TOTAL:-0}" -gt "0" ]; then
            echo "Deleting SonarCloud project $SONAR_PROJECT_KEY..."
            curl -sf -X POST \
              -H "Authorization: Bearer $SONAR_TOKEN" \
              "https://sonarcloud.io/api/projects/delete" \
              --data-urlencode "project=$SONAR_PROJECT_KEY"
            echo "SonarCloud project deleted."
          else
            echo "SonarCloud project does not exist — nothing to clean up."
          fi
