# https://virtocommerce.atlassian.net/browse/VCST-5155
name: Release

on:
  workflow_dispatch:

# Least privilege: the reusable release workflow pushes tags/commits with the
# REPO_TOKEN PAT, so the default GITHUB_TOKEN only needs read.
permissions:
  contents: read

jobs:
  release:
    uses: VirtoCommerce/.github/.github/workflows/release.yml@v3.800.37    
    secrets:
      envPAT: ${{ secrets.REPO_TOKEN }}