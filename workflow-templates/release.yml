name: Release

on:
  workflow_dispatch:

# Least privilege: the reusable workflow pushes with the REPO_TOKEN PAT, so GITHUB_TOKEN needs only read.
permissions:
  contents: read

jobs:
  release:
    uses: VirtoCommerce/.github/.github/workflows/release.yml@v3.800.41    
    secrets:
      envPAT: ${{ secrets.REPO_TOKEN }}