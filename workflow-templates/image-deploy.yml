# v0.2

name: VC image deployment
on:
  workflow_dispatch:
    inputs:
      baseImageName:
        description: 'Base kustomize image name'
        required: true
      artifactLink: 
        description: 'Full link to artifact docker image'
        required: true
      appDescriptionRepo:
        description: 'ArgoCd repository'
        required: true
        default: 'VirtoCommerce/vc-webstore-deploy'
      appDescriptionBranch:
        description: 'ArgoCd branch'
        required: true
        default: 'dev'

# Least privilege: push uses the REPO_TOKEN PAT; GITHUB_TOKEN only writes deployment status.
permissions:
  contents: read
  deployments: write

jobs:
  cd:
    runs-on: ubuntu-24.04
    steps: 
    
    - name: Start deployment
      uses: VirtoCommerce/vc-github-actions/gh-deployments@master
      id: deployment
      with:
        step: start
        token: ${{ secrets.GITHUB_TOKEN }}
        env: Development
        override: true

    - name: Checkout ArgoCD repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        token: ${{ secrets.REPO_TOKEN }}
        repository: "${{ github.event.inputs.appDescriptionRepo }}"
        ref: "${{ github.event.inputs.appDescriptionBranch }}"
        persist-credentials: false

    - name: Update kustomize
      shell: pwsh
      run: |
        cd ${{ github.workspace }}
        cd ./webstore-app/resources
        kustomize edit set image "$env:GITHUB_EVENT_INPUTS_BASEIMAGENAME=$env:GITHUB_EVENT_INPUTS_ARTIFACTLINK"
      env:
        GITHUB_EVENT_INPUTS_BASEIMAGENAME: ${{ github.event.inputs.baseImageName }}
        GITHUB_EVENT_INPUTS_ARTIFACTLINK: ${{ github.event.inputs.artifactLink }}

    - uses: VirtoCommerce/vc-github-actions/setup-git-credentials-github@master
      with:
        githubToken: ${{ secrets.REPO_TOKEN }}

    - name: Commit kustomize change
      shell: pwsh
      run: |
        if(git status --porcelain |Where {$_ -notmatch '^\?\?'}) # uncommitted changes exist
        {
          git commit -am "Automated update ${{ github.repository }} to $env:GITHUB_EVENT_INPUTS_ARTIFACTLINK"
          git push
        }
        else 
        {
          Write-Output 'Nothing to commit, working tree clean'
        }
      env:
        GITHUB_EVENT_INPUTS_ARTIFACTLINK: ${{ github.event.inputs.artifactLink }}

    - name: Wait for environment is up
      shell: pwsh
      timeout-minutes: 5
      run: | 
        do {
          Start-Sleep -s 15
          $statusBage = (Invoke-WebRequest -Uri "https://argo.govirto.com/api/badge?name=webstore-dev").Content
          
          $syncedAndHealthy = $statusBage.Contains('>Healthy<') -and $statusBage.Contains('>Synced<')
          if (-not $syncedAndHealthy) {
            Write-Host "Sync pending..."
          }
        }
        while (-not $syncedAndHealthy)
    - name: BUILD_STATE::successful
      if: success()
      run: echo "BUILD_STATE=successful" >> $GITHUB_ENV

    - name: BUILD_STATE::failed
      if: failure()
      run: echo "BUILD_STATE=failed"  >> $GITHUB_ENV

    - name: Update GitHub deployment status
      uses: VirtoCommerce/vc-github-actions/gh-deployments@master
      if: always()
      with:
        step: finish
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ job.status }}
        env: ${{ steps.deployment.outputs.env }}
        deployment_id: ${{ steps.deployment.outputs.deployment_id }}
