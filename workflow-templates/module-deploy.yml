# v3.800.41
# https://virtocommerce.atlassian.net/browse/VCST-5372
name: Module deployment
on:
  workflow_dispatch:
    inputs:
      blobUrl: 
        description: 'Artifact download url'
        required: true
      artifactVersion: 
        description: 'Full artifact build number'
        required: true
      moduleId:
        description: 'Module Id'
        required: true
      appDescriptionRepo:
        description: 'ArgoCd repository'
        required: true
        default: 'VirtoCommerce/vc-deploy-apps'
      appDescriptionBranch:
        description: 'ArgoCd branch'
        required: true
        default: 'master'
      appFolder:
        description: 'ArgoCd full path to folder containing app description code'
        required: true

# Least privilege: push uses the persisted REPO_TOKEN PAT; GITHUB_TOKEN only writes deployment status.
permissions:
  contents: read
  deployments: write

jobs:
  cd:
    runs-on: ubuntu-24.04
    steps: 
    
    - name: Start deployment
      uses: VirtoCommerce/.github/actions/gh-deployments@VCST-5414
      id: deployment
      with:
        step: start
        token: ${{ secrets.GITHUB_TOKEN }}
        env: Development
        no_override: false

    - name: Checkout ArgoCD repository # zizmor: ignore[artipacked] Commit step pushes with this persisted REPO_TOKEN; no setup-git-credentials step
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        token: ${{ secrets.REPO_TOKEN }}
        repository: "${{ github.event.inputs.appDescriptionRepo }}"
        ref: "${{ github.event.inputs.appDescriptionBranch }}"

    - name: Update deployment-cm
      shell: pwsh
      run: |
        cd ${{ github.workspace }}
        cd .$env:GITHUB_EVENT_INPUTS_APPFOLDER
        $fileName = "./deployment-cm.yaml"
        $content = Get-Content $fileName
        $key = "$env:GITHUB_EVENT_INPUTS_MODULEID"
        $artifactPath = "`"$env:GITHUB_EVENT_INPUTS_BLOBURL`""
        $content -replace "`"PackageUrl`":\s*.*$key.*", "`"PackageUrl`": $artifactPath" | Set-Content -Path $fileName
      env:
        GITHUB_EVENT_INPUTS_APPFOLDER: ${{ github.event.inputs.appFolder }}
        GITHUB_EVENT_INPUTS_MODULEID: ${{ github.event.inputs.moduleId }}
        GITHUB_EVENT_INPUTS_BLOBURL: ${{ github.event.inputs.blobUrl }}

    - name: Commit deployment-cm change
      shell: pwsh
      run: |
        if(git status --porcelain |Where {$_ -notmatch '^\?\?'}) # uncommitted changes exist
        {
          git config --global user.name 'GitHub Actions'
          git config user.email --global  'github.actions@virtoway.com'
          git commit -am "Automated update ${{ github.repository }} to $env:GITHUB_EVENT_INPUTS_ARTIFACTVERSION"
          git push
        }
        else 
        {
          Write-Output 'Nothing to commit, working tree clean'
        }
      env:
        GITHUB_EVENT_INPUTS_ARTIFACTVERSION: ${{ github.event.inputs.artifactVersion }}

    - name: Wait for environment is up
      shell: pwsh
      timeout-minutes: 5
      run: | 
        do {
          Start-Sleep -s 15
          $statusBage = (Invoke-WebRequest -Uri "https://cd.govirto.com/api/badge?name=webstore-app-dev").Content
          
          $syncedAndHealthy = $statusBage.Contains('>Healthy<') -and $statusBage.Contains('>Synced<')
          if (-not $syncedAndHealthy) {
            Write-Host "Sync pending..."
          }
        }
        while (-not $syncedAndHealthy)
    - name: BUILD_STATE::successful
      if: success()
      run: echo "BUILD_STATE=successful" >> $GITHUB_ENV

    - name: BUILD_STATE::failed
      if: failure()
      run: echo "BUILD_STATE=failed"  >> $GITHUB_ENV

    - name: Update GitHub deployment status
      uses: VirtoCommerce/.github/actions/gh-deployments@VCST-5414
      if: always()
      with:
        step: finish
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ job.status }}
        env: ${{ steps.deployment.outputs.env }}
        deployment_id: ${{ steps.deployment.outputs.deployment_id }}
